<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVG.Mercader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; min-height: 100vh; color: #e2e8f0; overflow-x: hidden; background: #0d111c; }
  .video-bg { position: fixed; inset: 0; z-index: -2; }
  .video-bg img { width: 110%; height: 110%; object-fit: cover; object-position: center; animation: slow-pan 20s ease-in-out infinite alternate; filter: brightness(0.85) saturate(1.1); }
  @keyframes slow-pan { from { transform: translateX(0) translateY(0) scale(1.05); } to { transform: translateX(-4%) translateY(-2%) scale(1.12); } }
  .overlay { position: fixed; inset: 0; z-index: -1; background: rgba(13,17,28,0.45); }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 58px; background: rgba(18,22,36,0.55); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; }
  .nav-center { display: flex; gap: 0.25rem; }
  .nav-btn { background: none; border: none; color: #94a3b8; font-size: 0.875rem; font-family: 'Inter', sans-serif; padding: 0.4rem 0.85rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 0.3rem; transition: all 0.2s; }
  .nav-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-right { display: flex; align-items: center; gap: 0.75rem; }
  .user-name { font-size: 0.875rem; color: #cbd5e1; }
  .bell-btn { background:none; border:none; color:#64748b; cursor:pointer; padding:0.3rem; border-radius:6px; }
  .bell-btn:hover { color:#fff; }
  main { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; }
  .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.75rem; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap svg { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; width: 16px; height: 16px; }
  .search-input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem; background: rgba(30,36,56,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e2e8f0; font-size: 0.9rem; font-family: 'Inter',sans-serif; outline: none; backdrop-filter: blur(8px); transition: border-color 0.2s; }
  .search-input::placeholder { color: #475569; }
  .search-input:focus { border-color: rgba(99,102,241,0.5); }
  .filter-select { padding: 0.7rem 1rem; background: rgba(30,36,56,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #cbd5e1; font-size: 0.875rem; font-family: 'Inter',sans-serif; cursor: pointer; outline: none; backdrop-filter: blur(8px); min-width: 130px; }
  .filter-select option { background: #1e2438; }
  .grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 0.85rem; }
  @media (max-width:1100px) { .grid { grid-template-columns: repeat(4,1fr); } }
  @media (max-width:860px)  { .grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width:580px)  { .grid { grid-template-columns: repeat(2,1fr); } }
  .card { background: rgba(22,28,48,0.92); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center; contain: layout style; will-change: auto; }
  .card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.2); box-shadow: 0 8px 28px rgba(0,0,0,0.45); }
  .card-img { width: 130px; height: 130px; background: rgba(10,14,28,0.55); border-radius: 8px; margin-bottom: 0.85rem; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .card-img img { width: 85%; height: 85%; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5)); transition: transform 0.25s; }
  .card:hover .card-img img { transform: scale(1.07); }
  .card-name { font-size: 0.92rem; font-weight: 700; margin-bottom: 0.25rem; }
  .card-value { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.7rem; }
  .card-value strong { color: #e2e8f0; font-weight: 600; }
  .card-stats { display: flex; flex-direction: column; gap: 0.18rem; font-size: 0.72rem; width: 100%; text-align: left; }
  .stat-row { display: flex; justify-content: space-between; }
  .stat-row span:first-child { font-weight: 700; color: #cbd5e1; }
  .stat-row span:last-child { color: #64748b; }
  .badge { font-weight: 600; }
  .badge.overpaid { color: #f59e0b; } .badge.rising { color: #22c55e; } .badge.fluctuating { color: #3b82f6; }
  .badge.stable { color: #22c55e; } .badge.dropping { color: #ef4444; } .badge.underpaid { color: #ef4444; } .badge.unstable { color: #f97316; }
  .name-legendary { color: #f59e0b; } .name-epic { color: #ef4444; } .name-rare { color: #eab308; }
  .name-gold { color: #f59e0b; } .name-red { color: #ef4444; } .name-purple { color: #a855f7; } .name-blue { color: #3b82f6; }
  .load-more { text-align: center; margin-top: 2rem; padding-bottom: 2rem; }
  .load-more button { padding: 0.7rem 2rem; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; color: #a5b4fc; font-family: 'Inter',sans-serif; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(8px); }
  .load-more button:hover { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c7d2fe; }
</style>
<script>
  (function() {
    const saved = localStorage.getItem('booga_bg');
    if (saved && saved !== 'original') {
      document.addEventListener('DOMContentLoaded', function() {
        const bgImg = document.querySelector('.video-bg img');
        if (bgImg) bgImg.src = saved;
      });
    }
  })();
</script>

      function loginWithDiscord(){ const CLIENT_ID='1501765131749687316'; const REDIRECT_URI=encodeURIComponent('https://evgmercader.github.io/booga/booga.html'); const SCOPE='identify'; window.location.href=`https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPE}`; }
      function applyUserUI(user){ const avatarURL=user.avatar?`https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`:`https://cdn.discordapp.com/embed/avatars/0.png`; document.getElementById('userAvatar').src=avatarURL; document.getElementById('userName').textContent=user.username; document.getElementById('userSection').style.display='flex'; document.getElementById('loginBtn').style.display='none'; document.getElementById('menuLoginRow').style.display='none'; }

        const saved=sessionStorage.getItem('discordUser'); if(saved){ applyUserUI(JSON.parse(saved)); }
        const hash=window.location.hash;
        if(hash.includes('access_token')){ const params=new URLSearchParams(hash.slice(1)); const token=params.get('access_token'); if(token){ sessionStorage.setItem('discordToken',token); fetch('https://discord.com/api/users/@me',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()).then(user=>{ sessionStorage.setItem('discordUser',JSON.stringify(user)); applyUserUI(user); history.replaceState(null,'',window.location.pathname); }); } }
